<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body,
      html,
      .container {
        width: 100vw;
        height: 100vh;
        -webkit-app-region: drag;
        overflow: hidden;
      }

      .video-crop {
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .kap-zoom-inner {
        width: 100%;
        height: 100%;
        transform-origin: 50% 46%;
      }

      video {
        background-color: black;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        -webkit-app-region: drag;
        transition: opacity 0.2s ease-in-out;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="video-crop">
        <div id="kap-zoom-inner" class="kap-zoom-inner">
          <video id="preview" autoplay muted playsinline></video>
        </div>
      </div>
    </div>
  </body>
  <script src="./camera.js"></script>
</html>
