# Publish to npm on GitHub Release (requires NPM_TOKEN secret). Builds Swift binaries on macOS first.

name: Publish to NPM

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Build universal Swift binaries
        run: bash binaries/build.sh
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
